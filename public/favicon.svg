<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" role="img" aria-labelledby="title desc">
  <title id="title">Ngọc Anh ethereal star mark</title>
  <desc id="desc">Biểu tượng quả cầu kính và ngôi sao bốn cánh trên nền xanh đêm.</desc>
  <defs>
    <radialGradient id="bg" cx="28%" cy="18%" r="90%">
      <stop offset="0" stop-color="#315CC9"/>
      <stop offset="0.55" stop-color="#0A286C"/>
      <stop offset="1" stop-color="#030B2D"/>
    </radialGradient>
    <radialGradient id="orb" cx="28%" cy="22%" r="78%">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity=".78"/>
      <stop offset=".18" stop-color="#DDEEFF" stop-opacity=".22"/>
      <stop offset=".66" stop-color="#79A7F0" stop-opacity=".08"/>
      <stop offset="1" stop-color="#173F96" stop-opacity=".03"/>
    </radialGradient>
    <linearGradient id="prism" x1="0" x2="1">
      <stop offset="0" stop-color="#A7F2FF"/>
      <stop offset=".42" stop-color="#D8C8FF"/>
      <stop offset=".7" stop-color="#FFD4E6"/>
      <stop offset="1" stop-color="#FFF1B8"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect x="1" y="1" width="78" height="78" rx="22" fill="url(#bg)" stroke="#DDEEFF" stroke-opacity=".28"/>
  <circle cx="40" cy="41" r="23" fill="url(#orb)" stroke="#DDEEFF" stroke-opacity=".42"/>
  <ellipse cx="40" cy="41" rx="31" ry="12" fill="none" stroke="#BFDFFF" stroke-opacity=".48" stroke-width="1.2" transform="rotate(-18 40 41)"/>
  <path d="M40 16c1.7 10.3 5.7 14.3 16 16-10.3 1.7-14.3 5.7-16 16-1.7-10.3-5.7-14.3-16-16 10.3-1.7 14.3-5.7 16-16Z" fill="url(#prism)" filter="url(#glow)"/>
  <path d="M12 54h56" stroke="url(#prism)" stroke-width="1.3" stroke-linecap="round" opacity=".82"/>
  <circle cx="16" cy="25" r="2.2" fill="#F7FBFF" opacity=".9"/>
  <circle cx="63" cy="57" r="1.7" fill="#FFD9E9" opacity=".9"/>
</svg>
